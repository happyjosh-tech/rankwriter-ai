name: Build & release plugin ZIP

on:
  push:
    tags:
      - 'v*'   # Triggers on v1.0.0, v1.0.1, v2.0.0-beta, etc.

  # Manual trigger from the Actions tab for re-runs
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write   # Needed to create releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve version from tag
        id: vars
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          # Strip leading "v" if present so "v1.0.1" -> "1.0.1"
          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for tag=$TAG (version=$VERSION)"

      - name: Sanity-check plugin header version matches tag
        run: |
          HEADER_VERSION=$(grep -E '^[[:space:]]*\*[[:space:]]*Version:' rankwriter-ai.php | head -1 | sed -E 's/.*Version:[[:space:]]*([^[:space:]]+).*/\1/')
          echo "Header version: $HEADER_VERSION"
          echo "Tag version:    ${{ steps.vars.outputs.version }}"
          if [ "$HEADER_VERSION" != "${{ steps.vars.outputs.version }}" ]; then
            echo "::warning::Plugin header version ($HEADER_VERSION) does not match tag (${{ steps.vars.outputs.version }}). Update rankwriter-ai.php before tagging."
          fi

      - name: PHP syntax lint (every PHP file)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y php-cli > /dev/null
          ERRORS=0
          while IFS= read -r f; do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f"
              ERRORS=$((ERRORS+1))
            fi
          done < <(find . -name '*.php' -not -path './.git/*' -not -path './.github/*' -not -path './build/*')
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS PHP file(s) failed lint. Refusing to build."
            exit 1
          fi
          echo "✓ All PHP files passed lint"

      - name: Build clean plugin ZIP
        run: |
          mkdir -p build/rankwriter-ai
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*.log' \
            --exclude='.phpunit.result.cache' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            ./ build/rankwriter-ai/
          cd build && zip -r rankwriter-ai.zip rankwriter-ai > /dev/null
          ls -lh rankwriter-ai.zip
          echo "ZIP contents (top-level):"
          unzip -l rankwriter-ai.zip | head -20

      - name: Generate update manifest (info.json)
        run: |
          cat > build/info.json <<EOF
          {
            "name":         "RankWriter AI",
            "version":      "${{ steps.vars.outputs.version }}",
            "tag":          "${{ steps.vars.outputs.tag }}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}/rankwriter-ai.zip",
            "requires":     "6.0",
            "tested":       "6.6",
            "requires_php": "7.4",
            "homepage":     "https://github.com/${{ github.repository }}",
            "released_at":  "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build/info.json

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.vars.outputs.tag }}
          name:                   RankWriter AI ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            build/rankwriter-ai.zip
            build/info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
